stages:
  transform:
    cmd: python backend/src/data_transform.py
    deps:
      - backend/data/raw/email_dataset.csv
      - backend/src/data_transform.py
    outs:
      - backend/data/processed/email_dataset_processed.csv
    params:
      - data.raw_path
      - data.processed_path
    plots: []
    metrics: []

  train:
    cmd: python backend/src/training.py
    deps:
      - backend/data/processed/email_dataset_processed.csv
      - backend/src/training.py
      - backend/src/data_transform.py
      - params_new.yml
    outs:
      - mlflow_artifacts/training_info.json:
          cache: false
    params:
      - data.processed_path
      - preprocessing
      - model_variants
      - mlflow
    metrics:
      - mlflow_artifacts/training_metrics.json:
          cache: false
    env:
      MLFLOW_TRACKING_URI:
        desc: MLflow tracking server URI

  evaluate:
    cmd: python backend/src/evaluation.py
    deps:
      - backend/data/processed/email_dataset_processed.csv
      - backend/src/evaluation.py
      - backend/src/data_transform.py
      - params_new.yml
      - mlflow_artifacts/training_info.json
    outs:
      - mlflow_artifacts/evaluation_report.csv:
          cache: false
    params:
      - data.processed_path
      - preprocessing
      - mlflow
    metrics:
      - mlflow_artifacts/evaluation_metrics.json:
          cache: false
    plots:
      - mlflow_artifacts/evaluation_confusion_matrix.json:
          template: confusion
          x: actual
          y: predicted

metrics:
  - mlflow_artifacts/metrics.json:
      cache: false
      desc: MLflow metrics

plots:
  - mlflow_artifacts/metrics.json:
      cache: false

remote:
  myremote:
    url: s3://your-bucket/ai-fraud-detector
    jobs: 4
